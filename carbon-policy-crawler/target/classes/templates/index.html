<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>碳资讯导航</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#36B37E',
                        neutral: '#F5F7FA',
                        dark: '#1D2129',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto { content-visibility: auto; }
            .card-hover { @apply transition-all duration-300 hover:shadow-lg hover:-translate-y-1; }
            .nav-active { @apply text-primary border-b-2 border-primary; }
            .tool-icon {
                @apply w-16 h-16 rounded-lg flex items-center justify-center bg-white shadow-md hover:shadow-lg transition-all duration-300 text-primary text-2xl;
            }
            .policy-tag {
                @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-primary/10 text-primary;
            }
            .policy-detail-item {
                @apply flex items-center text-sm text-gray-600 mb-1;
            }
            .view-btn {
                @apply text-primary hover:text-primary/80 transition-colors px-3 py-1 bg-primary/5 rounded-md hover:bg-primary/10;
            }
        }
    </style>
    <style>
        /* 表格通用样式 */
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }
        thead {
            background-color: #F5F7FA;
        }
        th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: #1D2129;
            font-size: 14px;
        }
        td {
            padding: 12px 16px;
            border-top: 1px solid #E5E7EB;
            font-size: 14px;
        }
        tr:hover {
            background-color: #F9FAFB;
        }
    </style>
</head>
<body class="bg-neutral font-sans text-dark">
<!-- 页面容器 -->
<div class="container mx-auto px-4 py-8 lg:px-8">
    <!-- 政策列表标题 -->
    <div class="mb-8">
        <h2 class="text-2xl md:text-3xl font-bold text-dark">政策资讯列表</h2>
        <p class="mt-2 text-gray-600">最新碳相关政策资讯，及时掌握行业动态</p>
    </div>

    <!-- 政策列表表格 -->
    <div class="card-hover bg-white rounded-lg shadow-sm p-4 mb-8">
        <table>
            <thead>
            <tr>
                <th class="w-2/3">标题</th>
                <th class="w-1/6">时间</th>
                <th class="w-1/6">操作</th>
            </tr>
            </thead>
            <tbody>
            <!-- Thymeleaf 循环渲染政策列表 -->
            <tr th:each="policy : ${policyList}">
                <td>
                    <!-- 政策标题链接 -->
                    <a th:href="@{/policy/detail/{id}(id=${policy.id})}"
                       target="_blank"
                       th:text="${policy.title}"
                       class="text-primary hover:text-primary/80 transition-colors font-medium">政策标题</a>
                    <!-- 政策来源 -->
                    <p class="mt-1 text-xs text-gray-500" th:text="${policy.source}">来源</p>
                </td>
                <!-- 发布时间 -->
                <td class="text-gray-600" th:text="${policy.publishTime}">2026-04-11</td>
                <!-- 查看按钮 -->
                <td>
                    <a th:href="@{/policy/detail/{id}(id=${policy.id})}"
                       target="_blank"
                       class="view-btn">查看</a>
                </td>
            </tr>
            <!-- 空数据提示 -->
            <tr th:if="${#lists.isEmpty(policyList)}">
                <td colspan="3" class="text-center py-8 text-gray-500">
                    <i class="fa-solid fa-file-alt mr-2"></i>暂无政策资讯数据
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
